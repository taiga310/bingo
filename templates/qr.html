{% extends "base.html" %}

{% block title %}QR コード{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; height: 100vh; padding: 24px; background: linear-gradient(135deg, #0f172a, #1e293b);">
  <div style="background: var(--bg-surface); padding: 40px; border-radius: 16px; text-align: center; box-shadow: 0 8px 32px rgba(96, 165, 250, 0.3);">
    <h1 style="margin-bottom: 24px; color: var(--accent-blue);">📱 E&R ビンゴ</h1>
    <p style="color: var(--text-muted); margin-bottom: 32px;">このQRコードをスキャンしてください</p>

    <div style="background: white; padding: 16px; border-radius: 12px; display: inline-block;">
      <img id="qr-code" src="/api/qr-code" alt="QR Code" style="width: 320px; height: 320px;">
    </div>

    <div style="margin-top: 32px;">
      <p style="color: var(--text-muted); font-size: 0.9rem;">または以下のURLをブラウザに入力</p>
      <p style="color: var(--accent-blue); font-family: monospace; margin-top: 8px; word-break: break-all;" id="url-display"></p>
    </div>
  </div>
</div>

<script>
  document.getElementById('url-display').textContent = window.location.origin;
</script>
{% endblock %}
