{% extends "base.html" %}

{% block title %}ビンゴアプリ - スタート{% endblock %}

{% block content %}
<style>
  #landing {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    padding: 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
    background: radial-gradient(circle at 50% 50%, rgba(37, 99, 235, 0.1), transparent 70%);
  }

  /* Animated fairies container */
  #flying-fairies {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  .flying-fairy {
    position: absolute;
    width: 60px;
    height: 60px;
    opacity: 0.6;
  }

  /* Content container (above fairies) */
  #landing-content {
    position: relative;
    z-index: 10;
  }

  #landing h1 {
    margin-bottom: 24px;
    font-size: 2.5rem;
    background: linear-gradient(135deg, #3b82f6, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 900;
    letter-spacing: 0.1em;
  }

  #landing p {
    color: var(--text-muted);
    margin-bottom: 24px;
    font-size: 1.1rem;
  }

  #start-button {
    padding: 16px 48px;
    font-size: 1.25rem;
    border-radius: 12px;
    min-width: 240px;
    position: relative;
    z-index: 20;
    animation: buttonGlow 2s ease-in-out infinite;
    border: 2px solid #60a5fa;
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  #start-button:hover {
    box-shadow: 0 0 30px rgba(96, 165, 250, 0.8);
    transform: scale(1.05);
  }

  @keyframes buttonGlow {
    0%, 100% {
      box-shadow: 0 0 10px rgba(96, 165, 250, 0.4);
    }
    50% {
      box-shadow: 0 0 30px rgba(96, 165, 250, 0.8);
    }
  }

  /* Main fairy (center) */
  #landing-mascot {
    position: relative;
    z-index: 15;
    animation: centerFairyBounce 1.2s ease-in-out infinite, leaderGlow 3s ease-in-out infinite;
  }

  @keyframes centerFairyBounce {
    0%, 100% {
      transform: translateY(0) scale(1);
    }
    50% {
      transform: translateY(-20px) scale(1.15);
    }
  }

  @keyframes leaderGlow {
    0%, 100% {
      filter: drop-shadow(0 6px 16px rgba(59, 130, 246, 0.5));
    }
    50% {
      filter: drop-shadow(0 10px 24px rgba(96, 165, 250, 0.8));
    }
  }

  #landing-mascot svg {
    filter: drop-shadow(0 6px 16px rgba(59, 130, 246, 0.5));
  }

  @keyframes runAway {
    0% {
      transform: scale(1) rotate(0deg);
      opacity: 1;
    }
    100% {
      transform: scale(0.5) rotate(45deg) translateY(200px) translateX(150px);
      opacity: 0;
    }
  }

  .fairy-running-away {
    animation: runAway 0.8s ease-in-out forwards !important;
  }

  @media (max-width: 768px) {
    #landing h1 {
      font-size: 1.8rem;
    }

    #start-button {
      min-width: 200px;
      font-size: 1rem;
      padding: 12px 32px;
    }

    #landing-mascot svg {
      width: 100px;
      height: 100px;
    }

    .flying-fairy {
      width: 40px;
      height: 40px;
    }
  }

  /* Star particle */
  .star {
    position: absolute;
    pointer-events: none;
    font-size: 1.5rem;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  .star {
    animation: twinkle 2s ease-in-out infinite;
  }
</style>

<div id="landing">
  <!-- Flying fairies -->
  <div id="flying-fairies"></div>

  <!-- Main content -->
  <div id="landing-content">
    <!-- Mascot with speech bubble -->
    <div style="position: relative; display: inline-block;">
      <!-- Speech bubble -->
      <div id="landing-bubble" style="
        background: linear-gradient(135deg, #2563eb, #60a5fa);
        border: 3px solid #60a5fa;
        border-radius: 20px;
        padding: 20px 28px;
        color: white;
        font-size: 1.1rem;
        font-weight: 700;
        max-width: 280px;
        text-align: center;
        box-shadow: 0 8px 24px rgba(37, 99, 235, 0.4);
        margin-bottom: 16px;
        line-height: 1.6;
        letter-spacing: 0.5px;
      ">
        ようこそ！E&R ビンゴへ🎉<br>楽しい時間をお過ごしください✨
      </div>

      <!-- Main Mascot -->
      <div id="landing-mascot">
        <svg viewBox="0 0 100 100" width="200" height="200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="fairy-grad-main" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
          </linearGradient>
        </defs>
        <ellipse cx="30" cy="35" rx="15" ry="25" fill="url(#fairy-grad-main)" opacity="0.7"/>
        <ellipse cx="70" cy="35" rx="15" ry="25" fill="url(#fairy-grad-main)" opacity="0.7"/>
        <circle cx="50" cy="60" r="18" fill="url(#fairy-grad-main)"/>
        <circle cx="50" cy="35" r="16" fill="url(#fairy-grad-main)"/>
        <circle cx="44" cy="32" r="3" fill="#0f172a"/>
        <circle cx="56" cy="32" r="3" fill="#0f172a"/>
        <path d="M 44 38 Q 50 41 56 38" stroke="#0f172a" stroke-width="2" fill="none" stroke-linecap="round"/>
        <line x1="65" y1="45" x2="75" y2="25" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
        <circle cx="75" cy="25" r="5" fill="#60a5fa"/>
        </svg>
      </div>
    </div>

    <h1 style="margin-top: 0; margin-bottom: 24px;">🎯 E&R ビンゴ</h1>

    <button id="start-button">📱 カードを受け取る</button>
  </div>
</div>

<!-- Name Input Modal -->
<div id="name-modal" style="
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.7);
  z-index: 1000;
  justify-content: center;
  align-items: center;
">
  <div style="
    background: linear-gradient(135deg, #1e293b, #0f172a);
    border: 3px solid #60a5fa;
    border-radius: 20px;
    padding: 40px 32px;
    color: white;
    text-align: center;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(37, 99, 235, 0.5);
  ">
    <h2 style="margin-top: 0; margin-bottom: 24px; font-size: 1.5rem;">名前(苗字)を入力してください</h2>
    <p style="margin-bottom: 20px; color: #cbd5e1; font-size: 0.95rem;">ビンゴカードに表示します</p>

    <input id="name-input" type="text" placeholder="例：田中" style="
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #60a5fa;
      border-radius: 8px;
      font-size: 1rem;
      background: #0f172a;
      color: white;
      box-sizing: border-box;
      margin-bottom: 20px;
    " />

    <div style="display: flex; gap: 12px; justify-content: center;">
      <button id="name-submit-btn" style="
        flex: 1;
        padding: 12px 24px;
        font-size: 1rem;
        border-radius: 8px;
        border: 2px solid #60a5fa;
        background: linear-gradient(135deg, #2563eb, #3b82f6);
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
      ">submit</button>
    </div>
  </div>
</div>

<script>
  // Create flying fairies orbiting around center (following the leader)
  function createFlyingFairies() {
    const container = document.getElementById('flying-fairies');
    const colors = [
      { start: '#60a5fa', end: '#3b82f6' },      // 青
      { start: '#a78bfa', end: '#8b5cf6' },      // 紫
      { start: '#ec4899', end: '#db2777' },      // ピンク
      { start: '#06b6d4', end: '#0891b2' },      // シアン
      { start: '#8b5cf6', end: '#7c3aed' },      // 濃紫
      { start: '#f97316', end: '#ea580c' },      // オレンジ
      { start: '#10b981', end: '#059669' },      // 緑
      { start: '#f43f5e', end: '#e11d48' },      // 赤
      { start: '#14b8a6', end: '#0d9488' },      // ティール
      { start: '#6366f1', end: '#4f46e5' }       // インディゴ
    ];

    // 10匹の妖精を中央を中心に円形で配置
    for (let i = 0; i < 10; i++) {
      const fairy = document.createElement('div');
      fairy.className = 'flying-fairy';

      const color = colors[i];
      const duration = 8 + Math.random() * 2; // 8～10秒で中央を周回
      const delay = i * 0.2; // ずらして登場
      const radius = 150; // 周回半径

      fairy.innerHTML = `
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="fairy-grad-${i}" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:${color.start};stop-opacity:1" />
              <stop offset="100%" style="stop-color:${color.end};stop-opacity:1" />
            </linearGradient>
          </defs>
          <ellipse cx="30" cy="35" rx="15" ry="25" fill="url(#fairy-grad-${i})" opacity="0.7"/>
          <ellipse cx="70" cy="35" rx="15" ry="25" fill="url(#fairy-grad-${i})" opacity="0.7"/>
          <circle cx="50" cy="60" r="18" fill="url(#fairy-grad-${i})"/>
          <circle cx="50" cy="35" r="16" fill="url(#fairy-grad-${i})"/>
        </svg>
      `;

      container.appendChild(fairy);

      // JavaScript で軌道アニメーションを設定
      const startAngle = (i / 10) * 360;
      const keyframes = `
        @keyframes orbit${i} {
          0% { --angle: ${startAngle}deg; opacity: 0.4; }
          50% { opacity: 0.7; }
          100% { --angle: ${startAngle + 360}deg; opacity: 0.4; }
        }
      `;

      const style = document.createElement('style');
      style.textContent = keyframes;
      document.head.appendChild(style);

      // JavaScript アニメーションを使用
      let startTime = null;
      let isRunning = false;

      const animate = (timestamp) => {
        if (isRunning) return; // 逃げ中は続行しない

        if (!startTime) startTime = timestamp;
        const progress = ((timestamp - startTime) % (duration * 1000)) / (duration * 1000);
        const angle = startAngle + progress * 360;
        const rad = (angle * Math.PI) / 180;
        const x = Math.cos(rad) * radius;
        const y = Math.sin(rad) * radius;

        fairy.style.left = `calc(50% + ${x}px - 30px)`;
        fairy.style.top = `calc(50% + ${y}px - 30px)`;
        fairy.style.opacity = 0.4 + 0.3 * Math.sin(progress * Math.PI);

        requestAnimationFrame(animate);
      };

      // パシリを逃すメソッド
      fairy.makeRunAway = () => {
        isRunning = true;
        fairy.classList.add('fairy-running-away');
        setTimeout(() => {
          fairy.style.display = 'none';
        }, 800);
      };

      setTimeout(() => {
        requestAnimationFrame(animate);
      }, delay * 1000);
    }
  }

  // Create twinkling stars
  function createStars() {
    const container = document.getElementById('landing');
    for (let i = 0; i < 8; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.textContent = '✨';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 2 + 's';
      container.appendChild(star);
    }
  }

  // Initialize
  createFlyingFairies();
  createStars();

  // 営業の熱いコメント
  const morimotoComments = [
    '契約しに行こう！',
    '雰囲気いくぞ！',
    '絶対成約だ！',
    '今日の勝負だ！',
    '全力で攻めろ！',
    'これが勝負の時だ！',
    'お客さんの信頼をつかめ！',
    'お客様のために！',
    'いけいけどんどん！',
    '契約獲得に突撃！',
    'このチャンスをものにしろ！',
    'やるしかない！',
    '今が旬だ！動け！',
    '勢い大事！いくぞ！',
    '熱くいこう！'
  ];

  // 森本のコメント表示＆パシリ逃げ
  function showMorimotoCommentAndMakeFairiesRunAway() {
    // 森本のコメント表示（右側に表示）
    const comment = morimotoComments[Math.floor(Math.random() * morimotoComments.length)];

    // 右側にランダムな位置に表示
    const posX = window.innerWidth - 100; // 右から100px
    const posY = 50 + Math.random() * (window.innerHeight - 200); // 上下ランダム

    const commentEl = document.createElement('div');
    commentEl.style.cssText = `
      position: fixed;
      top: ${posY}px;
      left: ${posX}px;
      transform: translate(-100%, 0);
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #0f172a;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: bold;
      z-index: 200;
      box-shadow: 0 4px 12px rgba(251, 191, 36, 0.5);
      animation: fadeInOut 2s ease-in-out;
      white-space: nowrap;
    `;
    commentEl.textContent = comment;
    document.body.appendChild(commentEl);

    // 2秒後に削除
    setTimeout(() => commentEl.remove(), 2000);

    // パシリ妖精を逃す（1～3匹）
    const fairies = Array.from(document.querySelectorAll('.flying-fairy'));
    const numToRun = Math.floor(Math.random() * 3) + 1; // 1～3匹
    const selected = new Set();

    for (let i = 0; i < numToRun && selected.size < fairies.length; i++) {
      let fairy;
      do {
        fairy = fairies[Math.floor(Math.random() * fairies.length)];
      } while (selected.has(fairy));

      selected.add(fairy);
      if (fairy.makeRunAway) {
        fairy.makeRunAway();
      }
    }
  }

  // 2～5秒ごとに森本のコメント表示＆パシリ逃げ（頻繁に）
  setInterval(showMorimotoCommentAndMakeFairiesRunAway, 2000 + Math.random() * 3000);

  // フェードイン・アウトアニメーション追加
  const style = document.createElement('style');
  style.textContent = `
    @keyframes fadeInOut {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      50% { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
    }
  `;
  document.head.appendChild(style);

  // Modal and name input handling
  const modal = document.getElementById('name-modal');
  const nameInput = document.getElementById('name-input');
  const nameSubmitBtn = document.getElementById('name-submit-btn');
  const startButton = document.getElementById('start-button');

  startButton.addEventListener('click', function() {
    modal.style.display = 'flex';
    nameInput.focus();
  });

  function submitName() {
    const name = nameInput.value.trim();
    if (name.length === 0) {
      alert('お名前を入力してください');
      return;
    }

    const seed = crypto.randomUUID();
    localStorage.setItem('bingo_permanent_seed', seed);
    localStorage.setItem('bingo_player_name', name);
    window.location.href = `/card?seed=${seed}`;
  }

  nameSubmitBtn.addEventListener('click', submitName);

  nameInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      submitName();
    }
  });
</script>
{% endblock %}
